name: modular-rag-assistant

services:
  postgres:
    image: postgres:16
    tmpfs:
      - /var/lib/postgresql/data
    env_file:
      - ./env/postgres.env
#    volumes:
#      - iot-wireless-mesh-daq-pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\"" ]
      interval: 3s
      timeout: 3s
      retries: 60


  # One-shot init: ALWAYS regenerates env files and ALWAYS hard-resets DB + applies rag.sql.
  bootstrap:
    build:
      context: /opt/stacks/modular-rag-assistant
      dockerfile: deploy/docker/bootstrap/Dockerfile
    image: mod-rag-api/bootstrap:local

    env_file:
      - ./env/postgres.env
      - ./env/mod-rag-api.env
    depends_on:
      postgres:
        condition: service_healthy

    command:
      - bash
      - -lc
      - |
        set -euxo pipefail  
        /deploy/scripts/init-postgres.sh
    restart: "no"

  mod-rag-api:
    build:
      context: /opt/stacks/modular-rag-assistant
      dockerfile: deploy/docker/mod-rag-api/Dockerfile
    image: mod-rag-api:local
    env_file:
      - ./env/mod-rag-api.env
      - ./env/postgres.env
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    restart: unless-stopped

    ports:
      - "127.0.0.1:8002:8002"

    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health', timeout=2).read()\""]
      interval: 10s
      timeout: 3s
      retries: 30

  mod-rag:
    build:
      context: /opt/stacks/modular-rag-assistant
      dockerfile: deploy/docker/mod-rag/Dockerfile
    image: mod-rag:local
    env_file:
      - ./env/mod-rag.env
    environment:
      PORTFOLIO_LOCK_ENABLED: "true"
    restart: unless-stopped

    ports:
      - "127.0.0.1:3003:3003"
